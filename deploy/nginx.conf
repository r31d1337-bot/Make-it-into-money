# Drop-in nginx server block for mintrapp.com.
# After certbot runs, it'll automatically add SSL directives + 301 the http
# block to https. Don't edit manually after certbot — re-run certbot instead.
#
# Install location: /etc/nginx/sites-available/mintrapp.com
# Symlink:           /etc/nginx/sites-enabled/mintrapp.com → ../sites-available/mintrapp.com
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name mintrapp.com www.mintrapp.com;

    # Stripe webhooks send raw JSON; don't buffer the request body.
    client_max_body_size 1m;

    # Reverse proxy everything to the Next.js process pm2 is managing.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Streamed responses (Anthropic SDK token deltas) need this.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 360s;
        proxy_send_timeout 360s;
    }

    # Long-cache the static assets Next emits with hashed filenames.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
